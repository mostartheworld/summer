<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎨 ผสมสีกัน! — Summer's World</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    min-height: 100vh;
    font-family: 'Fredoka', 'Noto Sans Thai', sans-serif;
    background: #fff9f0;
    overflow-x: hidden;
  }

  /* ── BACKGROUND ── */
  .blobs { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .blob {
    position: absolute; border-radius: 50%;
    animation: blob-float ease-in-out infinite;
    opacity: 0.22;
  }
  @keyframes blob-float {
    0%,100% { transform: translate(0,0) scale(1); }
    50%      { transform: translate(24px,-34px) scale(1.06); }
  }

  /* ── PAGE ── */
  .page {
    position: relative; z-index: 1;
    max-width: 520px; margin: 0 auto;
    padding: 20px 16px 56px;
  }

  /* ── BACK BUTTON ── */
  .back-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,.85); backdrop-filter: blur(8px);
    border: 2.5px solid #e9d5ff; border-radius: 999px;
    padding: 10px 22px; font-size: 15px; font-weight: 700;
    color: #7c3aed; text-decoration: none;
    box-shadow: 3px 3px 0 #e9d5ff;
    transition: transform .15s;
    margin-bottom: 22px;
  }
  .back-btn:hover  { transform: translateX(-4px); }
  .back-btn:active { transform: scale(.95); }

  /* ── HERO ── */
  .hero {
    text-align: center;
    background: rgba(255,255,255,.78);
    backdrop-filter: blur(14px);
    border: 3px solid rgba(255,255,255,.9);
    border-radius: 28px;
    padding: 26px 20px 22px;
    margin-bottom: 22px;
    box-shadow: 0 8px 32px rgba(0,0,0,.07);
  }
  .big-emoji {
    font-size: 68px; line-height: 1; display: block; margin-bottom: 10px;
    animation: palette-rock 3s ease-in-out infinite;
    filter: drop-shadow(0 6px 12px rgba(0,0,0,.12));
  }
  @keyframes palette-rock {
    0%,100% { transform: rotate(-8deg) scale(1); }
    50%      { transform: rotate(8deg)  scale(1.05); }
  }
  .hero h1 {
    font-family: 'Bungee', cursive;
    font-size: clamp(26px, 7vw, 38px);
    color: #1f2937;
    text-shadow: 3px 3px 0 rgba(255,107,157,.3);
    margin-bottom: 4px;
  }
  .hero-sub   { font-size: 12px; font-weight: 700; color: #9ca3af; letter-spacing: 2px; margin-bottom: 10px; }
  .hero-desc  {
    font-size: 15px; font-weight: 600; color: #374151;
    background: rgba(255,215,0,.18); border-radius: 14px;
    padding: 9px 16px; display: inline-block;
  }

  /* ── STEP HINT ── */
  .step-hint {
    text-align: center; font-size: 18px; font-weight: 700; color: #374151;
    margin-bottom: 16px; min-height: 30px; transition: all .3s;
  }
  .step-hint em {
    font-style: normal;
    background: linear-gradient(135deg, #FF6B9D, #FF9F1C);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    font-family: 'Bungee', cursive; font-size: 20px;
  }

  /* ── MIX STAGE ── */
  .mix-stage {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; margin-bottom: 26px;
  }
  .slot {
    display: flex; flex-direction: column; align-items: center; gap: 7px;
    flex-shrink: 0;
  }

  .slot-circle {
    width: 86px; height: 86px; border-radius: 50%;
    border: 4px solid #e5e7eb;
    background: #f3f4f6;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
    transition: background .4s ease, border-color .4s, box-shadow .4s;
    box-shadow: 0 4px 12px rgba(0,0,0,.08);
    position: relative; overflow: hidden;
  }
  .slot-circle.filled {
    border-color: transparent;
    box-shadow: 0 10px 28px rgba(0,0,0,.18);
    animation: slot-pop .45s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes slot-pop {
    0%  { transform: scale(.45) rotate(-15deg); }
    100%{ transform: scale(1)   rotate(0deg); }
  }

  .slot-label {
    font-size: 13px; font-weight: 700; color: #9ca3af;
    text-align: center; min-height: 20px; transition: color .3s;
  }
  .slot-label.named { color: #374151; }

  .mix-op {
    font-family: 'Bungee', cursive; font-size: 30px;
    color: #d1d5db; flex-shrink: 0;
    padding-bottom: 26px; transition: color .4s;
    user-select: none;
  }
  .mix-op.lit { color: #374151; }

  /* result slot is bigger */
  .result-slot .slot-circle {
    width: 104px; height: 104px; font-size: 44px;
  }
  .result-slot .slot-circle.filled {
    animation: result-pop .55s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes result-pop {
    0%  { transform: scale(0); opacity: 0; }
    70% { transform: scale(1.18); }
    100%{ transform: scale(1);   opacity: 1; }
  }

  /* mixing spin */
  .spin-mix { animation: spin-mix .7s linear infinite; }
  @keyframes spin-mix {
    to { transform: rotate(360deg) scale(1.08); }
  }

  /* ── COLOR PICKER ── */
  .picker-label {
    text-align: center; font-family: 'Bungee', cursive;
    font-size: 11px; letter-spacing: 3px; color: #9ca3af;
    margin-bottom: 14px;
  }
  .color-picker {
    display: flex; gap: 12px; justify-content: center;
    margin-bottom: 28px;
  }
  .color-btn {
    width: 98px; height: 98px; border-radius: 24px;
    border: 4px solid rgba(255,255,255,.55);
    cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px;
    box-shadow: 0 6px 20px rgba(0,0,0,.18);
    transition: transform .15s, box-shadow .15s, opacity .2s;
    position: relative; overflow: hidden;
  }
  .color-btn::after {
    content: ''; position: absolute; inset: 0;
    background: rgba(255,255,255,0); transition: background .15s;
    border-radius: 20px;
  }
  .color-btn:hover { transform: translateY(-5px) scale(1.05); box-shadow: 0 14px 34px rgba(0,0,0,.22); }
  .color-btn:hover::after { background: rgba(255,255,255,.12); }
  .color-btn:active { transform: scale(.93); }
  .color-btn:disabled { opacity: .38; cursor: default; transform: none !important; }
  .cb-emoji { font-size: 34px; line-height: 1; }
  .cb-name  { font-size: 14px; font-weight: 700; color: white; text-shadow: 0 1px 5px rgba(0,0,0,.3); }
  .cb-en    { font-size: 9px;  font-weight: 700; color: rgba(255,255,255,.75); letter-spacing: .8px; }

  /* ── RESULT CARD ── */
  .result-card {
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(16px);
    border: 3px solid rgba(255,255,255,.95);
    border-radius: 28px;
    padding: 30px 20px 24px;
    text-align: center;
    box-shadow: 0 14px 44px rgba(0,0,0,.1);
    animation: card-rise .5s cubic-bezier(.34,1.56,.64,1);
    margin-bottom: 14px;
  }
  @keyframes card-rise {
    from { opacity:0; transform: translateY(32px) scale(.9); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }
  .result-big { font-size: 88px; line-height: 1; display: block; margin-bottom: 14px;
    animation: result-spin .7s cubic-bezier(.34,1.56,.64,1); }
  @keyframes result-spin {
    from { transform: rotate(-25deg) scale(0); }
    to   { transform: rotate(0deg)   scale(1); }
  }
  .result-name-th {
    font-family: 'Bungee', cursive;
    font-size: 40px; color: #1f2937; margin-bottom: 4px;
  }
  .result-name-en {
    font-size: 15px; font-weight: 700; color: #6b7280;
    letter-spacing: 3px; margin-bottom: 16px;
  }
  .result-formula {
    display: inline-flex; align-items: center; gap: 10px; flex-wrap: wrap;
    justify-content: center;
    background: #f3f4f6; border-radius: 18px;
    padding: 11px 20px; font-size: 17px; font-weight: 700;
    color: #374151; margin-bottom: 14px;
  }
  .result-msg {
    font-size: 16px; font-weight: 600; color: #4b5563; margin-bottom: 22px;
  }
  .try-again-btn {
    background: linear-gradient(135deg, #FF6B9D, #FF9F1C);
    color: white; border: none; border-radius: 999px;
    padding: 15px 32px; font-size: 18px; font-weight: 700;
    font-family: 'Fredoka', 'Noto Sans Thai', sans-serif;
    cursor: pointer; width: 100%;
    box-shadow: 0 6px 22px rgba(255,107,157,.32);
    transition: transform .15s, box-shadow .15s;
  }
  .try-again-btn:hover  { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(255,107,157,.4); }
  .try-again-btn:active { transform: scale(.97); }

  /* ── HINT BANNER (same-color) ── */
  .hint-banner {
    background: rgba(255,248,210,.95);
    border: 2px solid #fde68a; border-radius: 20px;
    padding: 14px 18px; text-align: center;
    font-size: 15px; font-weight: 600; color: #92400e;
    margin-bottom: 14px;
    animation: card-rise .4s ease;
  }

  /* ── PARTICLES ── */
  .particle {
    position: fixed; pointer-events: none; z-index: 9999;
    font-size: 26px;
    animation: particle-fly ease-out forwards;
  }
  @keyframes particle-fly {
    0%   { opacity:1; transform: translate(0,0) scale(1) rotate(0deg); }
    100% { opacity:0; transform: translate(var(--dx),var(--dy)) scale(0) rotate(var(--rot)); }
  }

  /* ── DISCOVERED SHELF ── */
  .shelf-wrap {
    margin-bottom: 0;
    background: rgba(255,255,255,.68); backdrop-filter: blur(10px);
    border: 2px solid rgba(255,255,255,.9); border-radius: 22px;
    padding: 16px 18px;
    box-shadow: 0 4px 16px rgba(0,0,0,.06);
  }
  .shelf-title {
    font-family: 'Bungee', cursive; font-size: 10px; letter-spacing: 2.5px;
    color: #9ca3af; margin-bottom: 12px;
  }
  .shelf-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .shelf-badge {
    display: flex; align-items: center; gap: 6px;
    background: white; border: 2px solid #e5e7eb;
    border-radius: 14px; padding: 6px 14px;
    font-size: 14px; font-weight: 700; color: #374151;
    animation: slot-pop .4s cubic-bezier(.34,1.56,.64,1);
  }
  .shelf-badge-emoji { font-size: 20px; }

  @media (max-width: 400px) {
    .slot-circle { width: 74px; height: 74px; font-size: 26px; }
    .result-slot .slot-circle { width: 90px; height: 90px; }
    .color-btn { width: 86px; height: 86px; border-radius: 20px; }
    .cb-emoji { font-size: 28px; }
    .mix-op { font-size: 24px; padding-bottom: 22px; }
    .color-picker { gap: 8px; }
    .result-big { font-size: 72px; }
    .result-name-th { font-size: 32px; }
  }
</style>
</head>
<body>

<div class="blobs" id="blobs"></div>

<div class="page">

  <a href="index.html" class="back-btn">← กลับหน้าหลัก</a>

  <!-- Hero -->
  <div class="hero">
    <span class="big-emoji">🎨</span>
    <h1>ผสมสีกัน!</h1>
    <div class="hero-sub">COLOR MIXING</div>
    <div class="hero-desc">เลือกสีสองสี แล้วดูว่าได้สีอะไร! 🌈</div>
  </div>

  <!-- Step hint -->
  <div class="step-hint" id="stepHint"><em>แตะสีที่ 1</em> เลย!</div>

  <!-- Mixing stage -->
  <div class="mix-stage">

    <div class="slot">
      <div class="slot-circle" id="slot1">
        <span id="s1icon">?</span>
      </div>
      <div class="slot-label" id="s1label">สีที่ 1</div>
    </div>

    <div class="mix-op" id="opPlus">+</div>

    <div class="slot">
      <div class="slot-circle" id="slot2">
        <span id="s2icon">?</span>
      </div>
      <div class="slot-label" id="s2label">สีที่ 2</div>
    </div>

    <div class="mix-op" id="opEq">=</div>

    <div class="slot result-slot">
      <div class="slot-circle" id="slotResult">
        <span id="srIcon">?</span>
      </div>
      <div class="slot-label" id="srLabel">ผลลัพธ์</div>
    </div>

  </div>

  <!-- Color picker -->
  <div class="picker-label">เลือกสี — PICK A COLOR</div>
  <div class="color-picker">
    <button class="color-btn" id="btnRed"
      style="background:linear-gradient(145deg,#FF2A2A,#FF6B6B)"
      onclick="pickColor('red')">
      <span class="cb-emoji">🔴</span>
      <span class="cb-name">แดง</span>
      <span class="cb-en">Red</span>
    </button>
    <button class="color-btn" id="btnBlue"
      style="background:linear-gradient(145deg,#1A40FF,#5B7FFF)"
      onclick="pickColor('blue')">
      <span class="cb-emoji">🔵</span>
      <span class="cb-name">น้ำเงิน</span>
      <span class="cb-en">Blue</span>
    </button>
    <button class="color-btn" id="btnYellow"
      style="background:linear-gradient(145deg,#E8B800,#FFD93D)"
      onclick="pickColor('yellow')">
      <span class="cb-emoji">🟡</span>
      <span class="cb-name">เหลือง</span>
      <span class="cb-en">Yellow</span>
    </button>
  </div>

  <!-- Result area -->
  <div id="resultArea"></div>

  <!-- Discovery shelf -->
  <div id="shelfWrap" style="display:none" class="shelf-wrap">
    <div class="shelf-title">สีที่ค้นพบแล้ว 🔍 DISCOVERED</div>
    <div class="shelf-row" id="shelfRow"></div>
  </div>

</div>

<script>
  /* ─── Data ─────────────────────────────────────────────────────────── */
  const C = {
    red:    { name:'แดง',     en:'Red',    hex:'#FF2A2A', light:'#ff8080', emoji:'🔴' },
    blue:   { name:'น้ำเงิน', en:'Blue',   hex:'#1A40FF', light:'#7b9aff', emoji:'🔵' },
    yellow: { name:'เหลือง',  en:'Yellow', hex:'#E8B800', light:'#ffe566', emoji:'🟡' },
  };

  // mix results — key order: "color1+color2"
  const MIXES = {
    'red+blue':      { name:'ม่วง',   en:'Purple', hex:'#8B2FCC', emoji:'🟣', new:true,
                       msg:'แดง + น้ำเงิน = ม่วง เก่งมากเลย! 🎉' },
    'blue+red':      { name:'ม่วง',   en:'Purple', hex:'#8B2FCC', emoji:'🟣', new:true,
                       msg:'น้ำเงิน + แดง = ม่วง เก่งมากเลย! 🎉' },
    'red+yellow':    { name:'ส้ม',    en:'Orange', hex:'#FF8000', emoji:'🟠', new:true,
                       msg:'แดง + เหลือง = ส้ม เยี่ยมมาก! 🎉' },
    'yellow+red':    { name:'ส้ม',    en:'Orange', hex:'#FF8000', emoji:'🟠', new:true,
                       msg:'เหลือง + แดง = ส้ม เยี่ยมมาก! 🎉' },
    'blue+yellow':   { name:'เขียว',  en:'Green',  hex:'#1AB84F', emoji:'🟢', new:true,
                       msg:'น้ำเงิน + เหลือง = เขียว สุดยอด! 🎉' },
    'yellow+blue':   { name:'เขียว',  en:'Green',  hex:'#1AB84F', emoji:'🟢', new:true,
                       msg:'เหลือง + น้ำเงิน = เขียว สุดยอด! 🎉' },
    'red+red':       { name:'แดง',    en:'Red',    hex:'#CC0000', emoji:'🔴', new:false,
                       msg:'ผสมสีเดิมได้แดงเข้มขึ้น! ลองเปลี่ยนสีดูนะ 😊' },
    'blue+blue':     { name:'น้ำเงิน',en:'Blue',   hex:'#0A28CC', emoji:'🔵', new:false,
                       msg:'ผสมสีเดิมได้น้ำเงินเข้มขึ้น! ลองเปลี่ยนสีดูนะ 😊' },
    'yellow+yellow': { name:'เหลือง', en:'Yellow', hex:'#B88C00', emoji:'🟡', new:false,
                       msg:'ผสมสีเดิมได้เหลืองเข้มขึ้น! ลองเปลี่ยนสีดูนะ 😊' },
  };

  const SECONDARY_IDS = new Set(); // tracks which secondary colors discovered

  let picked1 = null, picked2 = null, busy = false;

  /* ─── UI helpers ────────────────────────────────────────────────────── */
  function lighten(hex) {
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return `rgb(${Math.min(255,r+70)},${Math.min(255,g+70)},${Math.min(255,b+70)})`;
  }

  function fillSlot(circleId, iconId, labelId, colorKey) {
    const col = C[colorKey];
    const circle = document.getElementById(circleId);
    circle.style.background = `radial-gradient(circle at 36% 32%, ${lighten(col.hex)}, ${col.hex})`;
    circle.style.borderColor = 'transparent';
    circle.style.boxShadow   = `0 10px 26px ${col.hex}55`;
    circle.classList.add('filled');
    document.getElementById(iconId).textContent = col.emoji;
    const lbl = document.getElementById(labelId);
    lbl.textContent = col.name;
    lbl.classList.add('named');
  }

  function clearSlot(circleId, iconId, labelId, defaultLabel) {
    const circle = document.getElementById(circleId);
    circle.style.background = '';
    circle.style.borderColor = '';
    circle.style.boxShadow   = '';
    circle.classList.remove('filled');
    const icon = document.getElementById(iconId);
    icon.textContent = '?';
    icon.className   = '';
    const lbl = document.getElementById(labelId);
    lbl.textContent = defaultLabel;
    lbl.classList.remove('named');
  }

  function setHint(html) {
    document.getElementById('stepHint').innerHTML = html;
  }

  function setButtonsDisabled(val) {
    ['btnRed','btnBlue','btnYellow'].forEach(id => {
      document.getElementById(id).disabled = val;
    });
  }

  /* ─── Pick ──────────────────────────────────────────────────────────── */
  function pickColor(key) {
    if (busy) return;
    if (!picked1) {
      picked1 = key;
      fillSlot('slot1','s1icon','s1label', key);
      setHint('ดี! ตอนนี้ <em>แตะสีที่ 2</em>!');
      document.getElementById('opPlus').classList.add('lit');
    } else if (!picked2) {
      picked2 = key;
      fillSlot('slot2','s2icon','s2label', key);
      document.getElementById('opEq').classList.add('lit');
      setHint('✨ <em>กำลังผสม...</em>');
      setButtonsDisabled(true);
      busy = true;
      startMix();
    }
  }

  /* ─── Mix animation ─────────────────────────────────────────────────── */
  function startMix() {
    const sr     = document.getElementById('slotResult');
    const srIcon = document.getElementById('srIcon');
    const c1 = C[picked1], c2 = C[picked2];

    // Swirling blend preview in result slot
    sr.style.background = `conic-gradient(${c1.hex}, ${c2.hex}, ${c1.hex})`;
    sr.style.borderColor = 'transparent';
    srIcon.textContent = '🌀';
    srIcon.className   = 'spin-mix';

    setTimeout(() => {
      const key = picked1 + '+' + picked2;
      const res = MIXES[key];
      if (!res) return;

      // Fill result circle
      sr.style.background = `radial-gradient(circle at 36% 32%, ${lighten(res.hex)}, ${res.hex})`;
      sr.style.boxShadow  = `0 10px 30px ${res.hex}66`;
      srIcon.className   = '';
      srIcon.textContent = res.emoji;
      sr.classList.add('filled');
      document.getElementById('srLabel').textContent = res.name;
      document.getElementById('srLabel').classList.add('named');

      showResult(res, c1, c2);
      if (res.new) {
        celebrate();
        addToShelf(res);
      }
      setHint('');
    }, 900);
  }

  /* ─── Result card ───────────────────────────────────────────────────── */
  function showResult(res, c1, c2) {
    const area = document.getElementById('resultArea');
    area.innerHTML = `
      <div class="result-card">
        <span class="result-big">${res.emoji}</span>
        <div class="result-name-th">${res.name}!</div>
        <div class="result-name-en">${res.en}</div>
        <div class="result-formula">
          ${c1.emoji} ${c1.name}
          <span style="color:#d1d5db">+</span>
          ${c2.emoji} ${c2.name}
          <span style="color:#d1d5db">=</span>
          ${res.emoji} ${res.name}
        </div>
        <div class="result-msg">${res.msg}</div>
        <button class="try-again-btn" onclick="resetAll()">🔄 ลองผสมสีใหม่!</button>
      </div>`;
    setTimeout(() => area.scrollIntoView({ behavior:'smooth', block:'nearest' }), 100);
  }

  /* ─── Reset ─────────────────────────────────────────────────────────── */
  function resetAll() {
    picked1 = null; picked2 = null; busy = false;
    clearSlot('slot1',      's1icon', 's1label',  'สีที่ 1');
    clearSlot('slot2',      's2icon', 's2label',  'สีที่ 2');
    clearSlot('slotResult', 'srIcon', 'srLabel',  'ผลลัพธ์');
    document.getElementById('opPlus').classList.remove('lit');
    document.getElementById('opEq').classList.remove('lit');
    document.getElementById('resultArea').innerHTML = '';
    setButtonsDisabled(false);
    setHint('<em>แตะสีที่ 1</em> เลย!');
    window.scrollTo({ top:0, behavior:'smooth' });
  }

  /* ─── Discovery shelf ───────────────────────────────────────────────── */
  function addToShelf(res) {
    const key = res.en; // unique per color
    if (SECONDARY_IDS.has(key)) return;
    SECONDARY_IDS.add(key);

    const wrap = document.getElementById('shelfWrap');
    wrap.style.display = 'block';

    const badge = document.createElement('div');
    badge.className = 'shelf-badge';
    badge.innerHTML = `<span class="shelf-badge-emoji">${res.emoji}</span>${res.name} · ${res.en}`;
    document.getElementById('shelfRow').appendChild(badge);

    if (SECONDARY_IDS.size === 3) {
      // all 3 discovered!
      setTimeout(() => {
        document.getElementById('shelfWrap').insertAdjacentHTML('beforeend',
          `<div style="margin-top:12px;font-size:15px;font-weight:700;color:#059669;text-align:center">
            🏆 เก่งมาก! ค้นพบสีครบ 3 สีแล้ว! 🌈
          </div>`);
        celebrate(); celebrate();
      }, 400);
    }
  }

  /* ─── Celebrate ─────────────────────────────────────────────────────── */
  function celebrate() {
    const emojis = ['🎉','⭐','✨','🌟','💫','🎊','🌈','💥'];
    const cx = window.innerWidth/2, cy = window.innerHeight*0.45;
    for (let i = 0; i < 18; i++) {
      setTimeout(() => {
        const p = document.createElement('div');
        p.className = 'particle';
        p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        p.style.left = cx + 'px';
        p.style.top  = cy + 'px';
        const angle = Math.random()*Math.PI*2;
        const dist  = 110 + Math.random()*220;
        p.style.setProperty('--dx', (Math.cos(angle)*dist) + 'px');
        p.style.setProperty('--dy', (Math.sin(angle)*dist) + 'px');
        p.style.setProperty('--rot', (Math.random()*800-400) + 'deg');
        p.style.animationDuration = (.7+Math.random()*.7) + 's';
        document.body.appendChild(p);
        setTimeout(()=>p.remove(), 1600);
      }, i * 55);
    }
  }

  /* ─── Background blobs ──────────────────────────────────────────────── */
  (function() {
    const cols = ["#ffb3d9","#ffe082","#a5f3c6","#bfdbfe","#ddd6fe","#99f6e4","#fca5a5","#fbcfe8"];
    const wrap = document.getElementById("blobs");
    for (let i = 0; i < 22; i++) {
      const b = document.createElement("div");
      b.className = "blob";
      const s = 40 + Math.random() * 120;
      b.style.cssText = `width:${s}px;height:${s}px;background:${cols[i%cols.length]};
        left:${Math.random()*100}%;top:${Math.random()*100}%;
        animation-duration:${8+Math.random()*14}s;animation-delay:${-Math.random()*10}s;`;
      wrap.appendChild(b);
    }
  })();
</script>
