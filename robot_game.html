<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤖 Robot Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@400;500;600;700&family=Mali:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg1: #FFE066; --bg2: #FF9F1C; --pink: #FF6B9D; --blue: #4ECDC4;
    --purple: #A06CD5; --dark: #2D3047; --cream: #FFF8E8; --green: #95E06C;
  }

  html { height: 100%; overflow: hidden; }

  body {
    height: 100%; overflow: hidden;
    font-family: 'Fredoka', 'Mali', sans-serif;
    user-select: none; -webkit-user-select: none; touch-action: none;
    display: flex; flex-direction: column;
    background:
      radial-gradient(circle at 20% 30%, #FFD93D 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, #FF6B9D 0%, transparent 50%),
      linear-gradient(135deg, #FFE066 0%, #4ECDC4 100%);
    position: relative;
  }

  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star { position: absolute; font-size: 18px; animation: twinkle 3s ease-in-out infinite; opacity: 0.7; }
  @keyframes twinkle {
    0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.4; }
    50% { transform: scale(1.3) rotate(180deg); opacity: 1; }
  }

  .game { flex: 1; min-height: 0; display: flex; flex-direction: column; position: relative; z-index: 1; }

  .site-nav {
    flex-shrink: 0; z-index: 100;
    background: var(--cream);
    border-bottom: 4px solid var(--dark);
    box-shadow: 0 4px 0 var(--dark);
    padding: 8px 14px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .nav-brand {
    font-family: 'Bungee', cursive;
    font-size: 14px; color: var(--dark);
    text-shadow: 2px 2px 0 var(--pink);
    white-space: nowrap; flex-shrink: 0; text-decoration: none;
  }
  .nav-links { display: flex; gap: 5px; flex-wrap: wrap; }
  .nav-link {
    text-decoration: none;
    font-family: 'Fredoka', 'Mali', sans-serif;
    font-size: 12px; font-weight: 600;
    padding: 4px 11px; border-radius: 10px;
    border: 2.5px solid var(--dark); color: var(--dark);
    background: white; transition: all .12s;
    display: inline-flex; align-items: center; gap: 4px; white-space: nowrap;
    box-shadow: 2px 2px 0 var(--dark);
  }
  .nav-link:hover  { background: var(--yellow); transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--dark); }
  .nav-link:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--dark); }
  .nav-link.active { background: var(--pink); color: white; }

  header {
    padding: 10px 12px 8px; text-align: center;
    background: rgba(255, 248, 232, 0.85); backdrop-filter: blur(10px);
    border-bottom: 4px dashed var(--dark);
    box-shadow: 0 4px 0 rgba(45, 48, 71, 0.2);
    position: relative;
  }

  h1 {
    font-family: 'Bungee', cursive;
    font-size: clamp(18px, 4.5vw, 26px);
    color: var(--dark); letter-spacing: 1px;
    text-shadow: 3px 3px 0 var(--pink);
    margin-top: 4px;
  }

  .subtitle { font-size: 12px; color: var(--dark); margin-top: 2px; font-weight: 500; }

  .random-btn {
    position: absolute; top: 8px; right: 8px;
    background: var(--pink); border: 3px solid var(--dark);
    border-radius: 50%; width: 56px; height: 56px;
    cursor: pointer; box-shadow: 3px 3px 0 var(--dark);
    font-size: 26px; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
    animation: bouncy 2s ease-in-out infinite;
  }
  .random-btn:active { transform: translate(3px, 3px); box-shadow: 0 0 0 var(--dark); }
  .random-btn.spinning { animation: spin 0.6s ease-in-out; }

  @keyframes bouncy {
    0%, 100% { transform: translateY(0) rotate(0); }
    50% { transform: translateY(-4px) rotate(10deg); }
  }
  @keyframes spin { from { transform: rotate(0); } to { transform: rotate(720deg); } }

  .random-label {
    position: absolute; top: 65px; right: 8px;
    background: var(--dark); color: white;
    padding: 2px 8px; border-radius: 8px;
    font-family: 'Bungee', cursive;
    font-size: 10px; letter-spacing: 1px;
    width: 56px; text-align: center;
    pointer-events: none;
  }

  .progress { display: flex; justify-content: center; gap: 6px; margin-top: 8px; }

  .dot {
    width: 28px; height: 8px; border-radius: 4px;
    background: rgba(45, 48, 71, 0.2); transition: all 0.3s;
  }
  .dot.done { background: var(--green); box-shadow: 0 0 12px var(--green); }

  .stage {
    flex: 1;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; padding: 8px; overflow: hidden;
  }

  .robot-area {
    background: rgba(255, 248, 232, 0.7); backdrop-filter: blur(8px);
    border: 4px solid var(--dark); border-radius: 24px;
    box-shadow: 6px 6px 0 var(--dark);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 8px;
  }
  .robot-area::before {
    content: '⚡ POWER LAB ⚡';
    position: absolute; top: 8px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Bungee', cursive;
    font-size: 11px; color: var(--dark); letter-spacing: 2px;
    background: var(--bg1); padding: 3px 10px;
    border-radius: 12px; border: 2px solid var(--dark);
    z-index: 2;
  }

  .robot { position: relative; width: 180px; height: 280px; margin-top: 20px; }

  .slot {
    position: absolute;
    border: 4px dashed rgba(45, 48, 71, 0.4);
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    color: rgba(45, 48, 71, 0.5);
    text-align: center; transition: all 0.2s;
  }
  .slot.highlight {
    border-color: var(--pink);
    background: rgba(255, 107, 157, 0.2);
    transform: scale(1.05);
    animation: pulse 0.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 107, 157, 0.5); }
    50% { box-shadow: 0 0 0 12px rgba(255, 107, 157, 0); }
  }
  .slot.filled { border-style: solid; border-color: var(--green); background: transparent; }
  .slot.placing { animation: pop 0.4s ease; }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  .slot-head { top: 0; left: 50%; transform: translateX(-50%); width: 100px; height: 90px; }
  .slot-body { top: 95px; left: 50%; transform: translateX(-50%); width: 130px; height: 100px; }
  .slot-arm-l { top: 105px; left: -30px; width: 55px; height: 80px; }
  .slot-arm-r { top: 105px; right: -30px; width: 55px; height: 80px; }
  .slot-legs { top: 200px; left: 50%; transform: translateX(-50%); width: 110px; height: 80px; }

  .parts-area {
    background: rgba(255, 248, 232, 0.7); backdrop-filter: blur(8px);
    border: 4px solid var(--dark); border-radius: 24px;
    box-shadow: 6px 6px 0 var(--dark);
    padding: 30px 12px 12px;
    position: relative; overflow-y: auto;
    display: flex; flex-direction: column;
    gap: 12px; align-items: center;
  }
  .parts-area::before {
    content: '🔧 PARTS';
    position: absolute; top: 8px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Bungee', cursive;
    font-size: 11px; color: var(--dark); letter-spacing: 1px;
    background: var(--blue); padding: 3px 10px;
    border-radius: 12px; border: 2px solid var(--dark);
    white-space: nowrap;
  }

  .part {
    position: relative; cursor: grab;
    transition: transform 0.2s;
    animation: float 3s ease-in-out infinite;
    touch-action: none;
  }
  .part:nth-child(2) { animation-delay: 0.5s; }
  .part:nth-child(3) { animation-delay: 1s; }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .part.dragging {
    cursor: grabbing; z-index: 1000; animation: none;
    transform: scale(1.1) rotate(5deg);
    filter: drop-shadow(0 8px 16px rgba(0,0,0,0.3));
  }
  .part.placed { animation: none; cursor: default; pointer-events: none; }
  .part svg { display: block; }

  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(45, 48, 71, 0.7);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 16px; opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-bg.show { opacity: 1; pointer-events: auto; }

  .modal {
    background: var(--cream);
    border: 5px solid var(--dark);
    border-radius: 28px; padding: 24px 20px;
    max-width: 360px; width: 100%;
    text-align: center;
    box-shadow: 8px 8px 0 var(--dark);
    transform: scale(0.5) rotate(-10deg);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .modal-bg.show .modal { transform: scale(1) rotate(0); }

  .modal-emoji {
    font-size: 56px; margin-bottom: 8px; display: inline-block;
    animation: wiggle 0.6s ease-in-out infinite;
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(-10deg); }
    50% { transform: rotate(10deg); }
  }

  .modal h2 { font-family: 'Bungee', cursive; font-size: 22px; color: var(--pink); margin-bottom: 4px; }
  .modal .en { font-family: 'Bungee', cursive; font-size: 16px; color: var(--blue); margin-bottom: 12px; }
  .modal p { font-size: 16px; line-height: 1.5; color: var(--dark); margin-bottom: 8px; font-weight: 500; }
  .modal .fact {
    background: var(--bg1); border: 3px solid var(--dark);
    border-radius: 16px; padding: 12px; margin: 12px 0; font-weight: 600;
  }

  .btn {
    background: var(--green); border: 4px solid var(--dark);
    border-radius: 16px; padding: 10px 24px;
    font-family: 'Bungee', cursive; font-size: 16px; color: var(--dark);
    cursor: pointer; box-shadow: 4px 4px 0 var(--dark);
    transition: all 0.1s; margin-top: 8px;
  }
  .btn:active { transform: translate(4px, 4px); box-shadow: 0 0 0 var(--dark); }

  .win .modal { background: linear-gradient(135deg, #FFD93D, #FF6B9D); }
  .win h2 { color: var(--dark); font-size: 28px; }

  .confetti {
    position: fixed; width: 12px; height: 12px;
    pointer-events: none; z-index: 200;
    animation: fall 2s linear forwards;
  }
  @keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

  @media (max-height: 700px) {
    .robot { width: 150px; height: 240px; }
    .slot-head { width: 85px; height: 75px; }
    .slot-body { top: 80px; width: 110px; height: 85px; }
    .slot-arm-l, .slot-arm-r { top: 90px; width: 45px; height: 70px; }
    .slot-arm-l { left: -25px; }
    .slot-arm-r { right: -25px; }
    .slot-legs { top: 170px; width: 95px; height: 70px; }
  }

  .speech {
    position: absolute; bottom: 12px; left: 50%;
    transform: translateX(-50%);
    background: white; border: 3px solid var(--dark);
    border-radius: 16px; padding: 8px 14px;
    font-size: 13px; font-weight: 600; color: var(--dark);
    white-space: nowrap; box-shadow: 3px 3px 0 var(--dark);
    animation: bounce-in 0.5s ease; max-width: 90%;
  }
  @keyframes bounce-in {
    0% { transform: translateX(-50%) scale(0); }
    60% { transform: translateX(-50%) scale(1.1); }
    100% { transform: translateX(-50%) scale(1); }
  }
</style>
</head>

const LESSONS = {
  head: { emoji: '🔋', titleTh: 'Electricity!', titleEn: 'ELECTRICITY!', desc: 'The robot head has a brain that uses electricity to work!', fact: '⚡ A robot brain uses electricity!' },
  body: { emoji: '⚙️', titleTh: 'Gears!', titleEn: 'GEARS!', desc: 'The body uses gears spinning together to create movement!', fact: '⚙️ Gears help machines move!' },
  'arm-l': { emoji: '💪', titleTh: 'Levers!', titleEn: 'LEVERS!', desc: 'Robot arms use lever ideas, like our arms lifting things!', fact: '💪 Arms are levers - simple machines!' },
  'arm-r': { emoji: '🦾', titleTh: 'Motors!', titleEn: 'MOTORS!', desc: 'A motor can spin and help the robot arm move and wave!', fact: '🔄 Motors spin to make things move!' },
  legs: { emoji: '🦿', titleTh: 'Movement!', titleEn: 'MOVEMENT!', desc: 'Legs or wheels help robots move from place to place!', fact: '🛞 Wheels reduce friction!' }
};

const SLOT_LABELS = {
  head: ['Head', 'HEAD'], body: ['Body', 'BODY'],
  'arm-l': ['Arm', 'ARM'], 'arm-r': ['Arm', 'ARM'], legs: ['Legs', 'LEGS']
};

let currentVariants = { head: 0, body: 0, 'arm-l': 0, 'arm-r': 0, legs: 0 };
const placedParts = new Set();
const partsArea = document.getElementById('partsArea');

function buildParts(showLessonsOnPlace = true) {
  partsArea.innerHTML = '';
  placedParts.clear();
  document.querySelectorAll('.slot').forEach(slot => {
    const id = slot.dataset.slot;
    slot.innerHTML = `${SLOT_LABELS[id][0]}<br>${SLOT_LABELS[id][1]}`;
    slot.classList.remove('filled', 'placing');
  });
  Object.keys(currentVariants).forEach(k => { currentVariants[k] = Math.floor(Math.random() * 3); });
  const ids = ['head', 'body', 'arm-l', 'arm-r', 'legs'];
  [...ids].sort(() => Math.random() - 0.5).forEach(id => {
    const div = document.createElement('div');
    div.className = 'part';
    div.dataset.id = id;
    div.dataset.showLesson = showLessonsOnPlace ? '1' : '0';
    div.innerHTML = VARIANTS[id][currentVariants[id]];
    partsArea.appendChild(div);
    setupDrag(div, id);
  });
  document.querySelectorAll('.dot').forEach(d => d.classList.remove('done'));
  document.getElementById('speech').textContent = 'Drag parts to build! 👉';
}

function setupDrag(el, partId) {
  let startX, startY, dragging = false, origParent, placeholder;
  function start(e) {
    if (placedParts.has(partId)) return;
    e.preventDefault();
    const touch = e.touches ? e.touches[0] : e;
    const rect = el.getBoundingClientRect();
    startX = touch.clientX - rect.left;
    startY = touch.clientY - rect.top;
    placeholder = document.createElement('div');
    placeholder.style.width = rect.width + 'px';
    placeholder.style.height = rect.height + 'px';
    origParent = el.parentNode;
    origParent.insertBefore(placeholder, el);
    el.style.position = 'fixed';
    el.style.left = rect.left + 'px';
    el.style.top = rect.top + 'px';
    el.style.width = rect.width + 'px';
    el.classList.add('dragging');
    document.body.appendChild(el);
    dragging = true;
    const slot = document.querySelector(`[data-slot="${partId}"]`);
    if (slot) slot.classList.add('highlight');
    document.addEventListener('mousemove', move);
    document.addEventListener('touchmove', move, { passive: false });
    document.addEventListener('mouseup', end);
    document.addEventListener('touchend', end);
  }
  function move(e) {
    if (!dragging) return;
    e.preventDefault();
    const touch = e.touches ? e.touches[0] : e;
    el.style.left = (touch.clientX - startX) + 'px';
    el.style.top = (touch.clientY - startY) + 'px';
  }
  function end(e) {
    if (!dragging) return;
    dragging = false;
    const touch = e.changedTouches ? e.changedTouches[0] : e;
    const slot = document.querySelector(`[data-slot="${partId}"]`);
    const slotRect = slot.getBoundingClientRect();
    document.querySelectorAll('.slot.highlight').forEach(s => s.classList.remove('highlight'));
    const inSlot = touch.clientX >= slotRect.left - 30 && touch.clientX <= slotRect.right + 30 &&
                   touch.clientY >= slotRect.top - 30 && touch.clientY <= slotRect.bottom + 30;
    if (inSlot) {
      placeIntoSlot(el, partId, slot, el.dataset.showLesson === '1');
    } else {
      origParent.insertBefore(el, placeholder);
      placeholder.remove();
      el.classList.remove('dragging');
      el.style.position = el.style.left = el.style.top = el.style.width = '';
    }
    document.removeEventListener('mousemove', move);
    document.removeEventListener('touchmove', move);
    document.removeEventListener('mouseup', end);
    document.removeEventListener('touchend', end);
  }
  el.addEventListener('mousedown', start);
  el.addEventListener('touchstart', start, { passive: false });
}

function placeIntoSlot(el, partId, slot, showLesson) {
  if (el.parentNode === document.body) {
    const ph = partsArea.querySelector('div[style*="width"]');
    if (ph) ph.remove();
  }
  slot.innerHTML = '';
  slot.appendChild(el);
  slot.classList.add('filled', 'placing');
  el.classList.remove('dragging');
  el.classList.add('placed');
  el.style.position = 'absolute';
  el.style.left = '50%';
  el.style.top = '50%';
  el.style.transform = 'translate(-50%, -50%)';
  el.style.width = '';
  placedParts.add(partId);
  updateProgress();
  playSuccess();
  if (showLesson) showLessonModal(partId);
  setTimeout(() => slot.classList.remove('placing'), 400);
}

function updateProgress() {
  const dots = document.querySelectorAll('.dot');
  for (let i = 0; i < placedParts.size; i++) dots[i].classList.add('done');
  const remaining = 5 - placedParts.size;
  if (remaining > 0) document.getElementById('speech').textContent = `${remaining} left! Almost there! 🎯`;
  if (placedParts.size === 5) setTimeout(showWin, 1200);
}

function showLessonModal(partId) {
  const lesson = LESSONS[partId];
  setTimeout(() => {
    document.getElementById('mEmoji').textContent = lesson.emoji;
    document.getElementById('mTitle').textContent = lesson.titleTh;
    document.getElementById('mTitleEn').textContent = lesson.titleEn;
    document.getElementById('mDesc').textContent = lesson.desc;
    document.getElementById('mFact').textContent = lesson.fact;
    document.getElementById('mBtn').textContent = 'NEXT ▶';
    document.getElementById('modal').classList.remove('win');
    document.getElementById('modal').classList.add('show');
    document.getElementById('mBtn').onclick = () => document.getElementById('modal').classList.remove('show');
  }, 400);
}

function showWin() {
  document.getElementById('mEmoji').textContent = '🎉';
  document.getElementById('mTitle').textContent = 'Amazing, Summer!';
  document.getElementById('mTitleEn').textContent = 'AMAZING!';
  document.getElementById('mDesc').textContent = 'You built the robot! Press 🎲 to try a new random robot!';
  document.getElementById('mFact').textContent = '✨ You are a little scientist! ✨';
  document.getElementById('mBtn').textContent = 'New Robot! 🎲';
  document.getElementById('mBtn').onclick = () => {
    document.getElementById('modal').classList.remove('show');
    setTimeout(() => buildParts(true), 300);
  };
  document.getElementById('modal').classList.add('show', 'win');
  const colors = ['#FF6B9D', '#4ECDC4', '#FFD93D', '#A06CD5', '#95E06C'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random() * 100 + '%';
      c.style.top = '-20px';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
      c.style.animationDuration = (1.5 + Math.random()) + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 2500);
    }, i * 30);
  }
  playFanfare();
}

document.getElementById('randomBtn').addEventListener('click', () => {
  const btn = document.getElementById('randomBtn');
  btn.classList.add('spinning');
  setTimeout(() => btn.classList.remove('spinning'), 600);
  document.getElementById('modal').classList.remove('show');
  playRandomSound();
  buildParts(true);
  document.getElementById('speech').textContent = '🎲 New parts! Drag to build! 👉';
});

let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq, duration, type = 'sine', vol = 0.2) {
  const ctx = getAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + duration);
}
function playSuccess() { beep(523,.12); setTimeout(()=>beep(659,.12),80); setTimeout(()=>beep(784,.18),160); }
function playFanfare() { [523,659,784,1047].forEach((n,i)=>setTimeout(()=>beep(n,.3,'square'),i*130)); }
function playRandomSound() { for(let i=0;i<8;i++) setTimeout(()=>beep(400+Math.random()*600,.06,'square',.15),i*40); }

buildParts(true);
