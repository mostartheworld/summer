<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เหรียญไทย — Summer's World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700;800;900&family=Prompt:wght@700;800;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans Thai', 'Nunito', system-ui, sans-serif;
      min-height: 100vh; background: #fff9f0; overflow-x: hidden;
    }
    body::before {
      content: ""; position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 50% at 0% 0%,   #ffe0f7 0%, transparent 55%),
        radial-gradient(ellipse 60% 40% at 100% 0%,  #fff3cd 0%, transparent 55%),
        radial-gradient(ellipse 55% 45% at 50% 100%, #fffbd0 0%, transparent 55%),
        radial-gradient(ellipse 40% 35% at 0% 100%,  #d4f7ff 0%, transparent 50%);
      pointer-events: none;
    }

    .blobs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .blob  { position: absolute; border-radius: 50%; animation: floatBlob linear infinite; opacity: .35; }
    @keyframes floatBlob {
      0%   { transform: translateY(0) rotate(0deg) scale(1); }
      33%  { transform: translateY(-16px) rotate(120deg) scale(1.06); }
      66%  { transform: translateY(10px) rotate(240deg) scale(.95); }
      100% { transform: translateY(0) rotate(360deg) scale(1); }
    }

    .page { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 32px 16px 80px; }

    /* ── NAV ── */
    .site-nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,249,240,.92);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 2px solid #f0e8fb;
      padding: 10px 16px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .nav-home {
      display: inline-flex; align-items: center; gap: 6px;
      text-decoration: none;
      font-family: 'Prompt','Noto Sans Thai',sans-serif;
      font-size: 14px; font-weight: 900;
      padding: 9px 20px; border-radius: 999px;
      background: linear-gradient(135deg,#ff6b9d,#ff8a5b);
      color: #fff; white-space: nowrap; flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(255,107,157,.3);
      transition: transform .15s, box-shadow .15s;
    }
    .nav-home:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(255,107,157,.4); }
    .nav-links { display: flex; gap: 6px; flex-wrap: wrap; }
    .nav-link {
      text-decoration: none;
      font-family: 'Prompt','Noto Sans Thai',sans-serif;
      font-size: 12px; font-weight: 800;
      padding: 7px 13px; border-radius: 999px;
      border: 2px solid #e8dff0; color: #7c6d88;
      background: #fff; transition: all .18s;
      display: inline-flex; align-items: center; gap: 4px; white-space: nowrap;
    }
    .nav-link:hover { border-color: #c084fc; color: #7c3aed; transform: translateY(-1px); }
    .nav-link.active {
      background: linear-gradient(135deg,#a855f7,#3b82f6);
      color: #fff; border-color: transparent;
      box-shadow: 0 3px 10px rgba(168,85,247,.35);
    }
    @media (max-width: 420px) {
      .nav-home { font-size: 13px; padding: 8px 14px; }
      .nav-link { font-size: 11px; padding: 6px 10px; }
    }

    /* Hero */
    .hero { text-align: center; margin-bottom: 36px; }
    .hero-emoji {
      font-size: 88px; display: block; margin-bottom: 8px;
      animation: heroBounce 2.5s ease-in-out infinite;
      filter: drop-shadow(0 6px 18px rgba(245,158,11,.3));
    }
    @keyframes heroBounce {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-14px) scale(1.07); }
    }
    .hero-title {
      font-family: 'Prompt', 'Noto Sans Thai', sans-serif;
      font-size: clamp(34px, 9vw, 56px); font-weight: 900; line-height: 1.1;
      background: linear-gradient(135deg, #f59e0b, #d97706, #b45309);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero-sub { font-size: 16px; color: #78716c; margin-top: 8px; font-weight: 600; }

    /* Section heading */
    .section-title {
      font-family: 'Prompt', 'Noto Sans Thai', sans-serif;
      font-size: 22px; font-weight: 900; color: #1c1917;
      margin-bottom: 18px; display: flex; align-items: center; gap: 10px;
    }

    /* ── COIN LEARN GRID ── */
    .coins-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 48px;
    }
    .coin-card {
      background: #fff; border-radius: 22px;
      padding: 18px 10px 16px; text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,.09);
      transition: transform .2s, box-shadow .2s;
    }
    .coin-card:hover { transform: translateY(-5px); box-shadow: 0 12px 32px rgba(0,0,0,.14); }

    /* Coin visuals */
    .coin {
      width: 72px; height: 72px; border-radius: 50%;
      margin: 0 auto 12px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Prompt', sans-serif; font-weight: 900;
    }
    .coin-1 {
      font-size: 22px; color: #555;
      background: radial-gradient(circle at 35% 30%, #f4f4f4, #aaa);
      box-shadow: 0 4px 12px rgba(0,0,0,.2), inset 0 1px 4px rgba(255,255,255,.7);
    }
    .coin-2 {
      font-size: 22px; color: #444;
      background: radial-gradient(circle at 35% 30%, #e8e8e8, #999);
      box-shadow: 0 4px 12px rgba(0,0,0,.2), inset 0 1px 4px rgba(255,255,255,.7);
      border: 4px solid #c8c8c8;
    }
    .coin-5 {
      font-size: 22px; color: #4a3500;
      background: radial-gradient(circle at 35% 30%, #f0f0f0, #b5b5b5);
      box-shadow: 0 4px 12px rgba(0,0,0,.2), inset 0 1px 4px rgba(255,255,255,.7);
      border: 6px solid #d4a017;
    }
    .coin-10 {
      font-size: 20px; color: #7c2d12;
      background: radial-gradient(circle at 35% 30%, #fef08a, #d97706);
      box-shadow: 0 4px 12px rgba(0,0,0,.2), inset 0 1px 4px rgba(255,255,255,.5);
      border: 6px solid #c0c0c0;
    }

    .coin-value {
      font-family: 'Prompt', 'Noto Sans Thai', sans-serif;
      font-size: 17px; font-weight: 900; color: #1c1917; margin-bottom: 2px;
    }
    .coin-label { font-size: 11px; color: #78716c; font-weight: 600; }

    /* Coin hint badge */
    .coin-hint {
      font-size: 10px; font-weight: 700; margin-top: 6px;
      padding: 3px 8px; border-radius: 999px; display: inline-block;
    }
    .hint-silver { background: #f1f5f9; color: #64748b; }
    .hint-gold   { background: #fef3c7; color: #b45309; }
    .hint-two    { background: #fef9ee; color: #92400e; border: 1px solid #fde68a; }

    /* ── QUIZ ── */
    .quiz-box {
      background: #fff; border-radius: 28px;
      padding: 28px 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,.1);
    }

    .quiz-progress-wrap { margin-bottom: 22px; }
    .quiz-progress-text { font-size: 13px; color: #92400e; font-weight: 700; margin-bottom: 6px; }
    .quiz-progress-bar  { height: 10px; background: #fef3c7; border-radius: 999px; overflow: hidden; }
    .quiz-progress-fill { height: 100%; background: linear-gradient(90deg, #f59e0b, #fcd34d); border-radius: 999px; transition: width .4s ease; }

    .quiz-coin-area { text-align: center; margin-bottom: 28px; }
    .quiz-coin-big {
      width: 130px; height: 130px; border-radius: 50%;
      margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center;
      transition: transform .2s;
    }
    .quiz-coin-big.coin-1  { font-size: 40px; border-width: 0; }
    .quiz-coin-big.coin-2  { font-size: 40px; border-width: 7px; }
    .quiz-coin-big.coin-5  { font-size: 40px; border-width: 11px; }
    .quiz-coin-big.coin-10 { font-size: 36px; border-width: 11px; }

    .quiz-coin-big.shake { animation: shakeCoin .45s; }
    @keyframes shakeCoin {
      0%,100% { transform: translateX(0); }
      20%,60%  { transform: translateX(-10px); }
      40%,80%  { transform: translateX(10px); }
    }
    .quiz-question { font-size: 20px; font-weight: 800; color: #1c1917; }

    .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .quiz-btn {
      padding: 16px 8px; border: 3px solid #fde68a; border-radius: 18px;
      background: #fffbeb;
      font-family: 'Prompt', 'Noto Sans Thai', sans-serif;
      font-size: 22px; font-weight: 900; color: #92400e;
      cursor: pointer; transition: all .15s;
      min-height: 68px;
    }
    .quiz-btn:hover:not(:disabled) { background: #fef3c7; transform: translateY(-2px); box-shadow: 0 6px 16px rgba(245,158,11,.3); }
    .quiz-btn:active:not(:disabled) { transform: scale(.95); }
    .quiz-btn.correct { background: #dcfce7 !important; border-color: #22c55e !important; color: #15803d !important; }
    .quiz-btn.wrong   { background: #fee2e2 !important; border-color: #f87171 !important; color: #b91c1c !important; }
    .quiz-btn:disabled { cursor: default; }

    .quiz-feedback {
      text-align: center; margin-top: 18px;
      font-size: 26px; font-weight: 900; min-height: 40px;
    }
    .quiz-feedback.correct { color: #16a34a; }
    .quiz-feedback.wrong   { color: #dc2626; }

    .quiz-next-btn {
      display: block; width: 100%; margin-top: 16px;
      padding: 16px; border: none; border-radius: 18px;
      background: linear-gradient(135deg, #f59e0b, #fcd34d);
      font-family: 'Prompt', 'Noto Sans Thai', sans-serif;
      font-size: 20px; font-weight: 900; color: #7c2d12;
      cursor: pointer; transition: transform .2s, box-shadow .2s;
      box-shadow: 0 4px 14px rgba(245,158,11,.4);
    }
    .quiz-next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(245,158,11,.45); }
    .quiz-next-btn:active { transform: scale(.97); }

    /* Result */
    .result-box { text-align: center; padding: 16px 0 8px; }
    .result-emoji { font-size: 76px; display: block; margin-bottom: 10px; animation: heroBounce 2s ease-in-out infinite; }
    .result-title { font-family: 'Prompt', sans-serif; font-size: 28px; font-weight: 900; color: #1c1917; margin-bottom: 6px; }
    .result-score { font-size: 52px; font-weight: 900; color: #f59e0b; font-family: 'Nunito', sans-serif; margin-bottom: 6px; }
    .result-sub { font-size: 16px; color: #78716c; margin-bottom: 28px; }
    .restart-btn {
      padding: 16px 44px; border: none; border-radius: 999px;
      background: linear-gradient(135deg, #f59e0b, #fcd34d);
      font-family: 'Prompt', 'Noto Sans Thai', sans-serif;
      font-size: 20px; font-weight: 900; color: #7c2d12;
      cursor: pointer; box-shadow: 0 4px 18px rgba(245,158,11,.4);
      transition: transform .2s;
    }
    .restart-btn:hover { transform: scale(1.06); }

    @media (max-width: 520px) {
      .page { padding: 24px 12px 60px; }
      .coins-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .quiz-options { gap: 10px; }
      .quiz-btn { font-size: 20px; min-height: 60px; }
      .quiz-coin-big { width: 110px; height: 110px; }
    }
  </style>
</head>
<body>

<div class="blobs" id="blobs"></div>

<nav class="site-nav">
  <a class="nav-home" href="home.html">🏠 หน้าหลัก</a>
  <div class="nav-links">
    <a class="nav-link" href="24_question.html">🎲 24 คำถาม</a>
    <a class="nav-link" href="knowledge.html">📚 เรียนรู้</a>
    <a class="nav-link active" href="thai_money.html">🪙 เหรียญ</a>
    <a class="nav-link" href="pay_money.html">🛒 จ่ายเงิน</a>
    <a class="nav-link" href="school_dashboard.html">🏫 โรงเรียน</a>
  </div>
</nav>

<div class="page">

  <div class="hero">
    <span class="hero-emoji">🪙</span>
    <h1 class="hero-title">เหรียญไทย</h1>
    <p class="hero-sub">Thai Coins · เรียนรู้เหรียญบาท 🇹🇭</p>
  </div>

  <!-- Learn Section -->
  <div class="section-title">🔍 รู้จักเหรียญ</div>
  <div class="coins-grid">

    <div class="coin-card">
      <div class="coin coin-1">๑</div>
      <div class="coin-value">1 บาท</div>
      <div class="coin-label">One Baht</div>
      <span class="coin-hint hint-silver">⚪ สีเงิน</span>
    </div>

    <div class="coin-card">
      <div class="coin coin-2">๒</div>
      <div class="coin-value">2 บาท</div>
      <div class="coin-label">Two Baht</div>
      <span class="coin-hint hint-silver">⚪ สีเงิน ขอบ</span>
    </div>

    <div class="coin-card">
      <div class="coin coin-5">๕</div>
      <div class="coin-value">5 บาท</div>
      <div class="coin-label">Five Baht</div>
      <span class="coin-hint hint-gold">🟡 ขอบทอง</span>
    </div>

    <div class="coin-card">
      <div class="coin coin-10">๑๐</div>
      <div class="coin-value">10 บาท</div>
      <div class="coin-label">Ten Baht</div>
      <span class="coin-hint hint-two">🟡⚪ สองสี</span>
    </div>

  </div>

  <!-- Quiz Section -->
  <div class="section-title">🎮 เกมทาย!</div>
  <div class="quiz-box">
    <div id="quizContent"></div>
  </div>

</div>

<script>
  // Blobs
  (function() {
    const cols = ["#fde68a","#fca5a5","#fbcfe8","#a5f3c6","#bfdbfe","#fef08a","#fed7aa","#ddd6fe"];
    const wrap = document.getElementById("blobs");
    for (let i = 0; i < 22; i++) {
      const b = document.createElement("div");
      b.className = "blob";
      const s = 40 + Math.random() * 110;
      b.style.cssText = `width:${s}px;height:${s}px;background:${cols[i%cols.length]};left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${8+Math.random()*14}s;animation-delay:-${Math.random()*10}s;`;
      wrap.appendChild(b);
    }
  })();

  const COINS = [
    { value: 1,  thai: '๑',  label: '1 บาท',  cls: 'coin-1' },
    { value: 2,  thai: '๒',  label: '2 บาท',  cls: 'coin-2' },
    { value: 5,  thai: '๕',  label: '5 บาท',  cls: 'coin-5' },
    { value: 10, thai: '๑๐', label: '10 บาท', cls: 'coin-10' },
  ];
  const TOTAL = 8;
  let questions = [], current = 0, score = 0;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function startQuiz() {
    const q = [];
    COINS.forEach(c => { q.push(c); q.push(c); });
    questions = shuffle(q);
    current = 0;
    score = 0;
    renderQuestion();
  }

  function renderQuestion() {
    const coin = questions[current];
    const others = shuffle(COINS.filter(c => c.value !== coin.value)).slice(0, 2);
    const opts = shuffle([coin, ...others]);
    const pct = Math.round((current / TOTAL) * 100);

    document.getElementById('quizContent').innerHTML = `
      <div class="quiz-progress-wrap">
        <div class="quiz-progress-text">ข้อ ${current + 1} จาก ${TOTAL}</div>
        <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="quiz-coin-area">
        <div class="quiz-coin-big ${coin.cls}" id="quizCoin">${coin.thai}</div>
        <div class="quiz-question">นี่คือเหรียญกี่บาท? 🤔</div>
      </div>
      <div class="quiz-options">
        ${opts.map(o => `<button class="quiz-btn" onclick="answer(${o.value},${coin.value})" data-val="${o.value}">${o.label}</button>`).join('')}
      </div>
      <div class="quiz-feedback" id="qFeedback"></div>
    `;
  }

  function answer(chosen, correct) {
    document.querySelectorAll('.quiz-btn').forEach(b => b.disabled = true);
    const fb = document.getElementById('qFeedback');

    if (chosen === correct) {
      score++;
      document.querySelector(`[data-val="${correct}"]`).classList.add('correct');
      fb.className = 'quiz-feedback correct';
      fb.textContent = '🎉 เก่งมากเลย!';
    } else {
      document.querySelector(`[data-val="${chosen}"]`).classList.add('wrong');
      document.querySelector(`[data-val="${correct}"]`).classList.add('correct');
      fb.className = 'quiz-feedback wrong';
      fb.textContent = '💪 ลองใหม่ครั้งหน้านะ!';
      const c = document.getElementById('quizCoin');
      if (c) { c.classList.add('shake'); setTimeout(() => c.classList.remove('shake'), 450); }
    }

    const btn = document.createElement('button');
    btn.className = 'quiz-next-btn';
    btn.textContent = current + 1 < TOTAL ? 'ข้อต่อไป →' : 'ดูผลลัพธ์ 🏆';
    btn.onclick = () => {
      current++;
      current < TOTAL ? renderQuestion() : renderResult();
    };
    fb.insertAdjacentElement('afterend', btn);
  }

  function renderResult() {
    let emoji = '🥇', msg = 'เก่งมากที่สุดเลย!';
    if (score <= 4) { emoji = '😊'; msg = 'ฝึกอีกนิดนะ!'; }
    else if (score <= 6) { emoji = '⭐'; msg = 'ดีมากเลย!'; }

    document.getElementById('quizContent').innerHTML = `
      <div class="result-box">
        <span class="result-emoji">${emoji}</span>
        <div class="result-title">${msg}</div>
        <div class="result-score">${score} / ${TOTAL}</div>
        <div class="result-sub">ซัมเมอร์ตอบถูก ${score} ข้อ จาก ${TOTAL} ข้อ 🌟</div>
        <button class="restart-btn" onclick="startQuiz()">🔄 เล่นอีกครั้ง</button>
      </div>
    `;
  }

  startQuiz();
</script>
</body>
</html>
