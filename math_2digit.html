<html lang="th">
<head>
  <meta charset="UTF-8">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #fff9f0;
      --dark:  #1e293b;
      --c1:    #f97316;
      --c2:    #eab308;
      --c3:    #fb923c;
    }

    body {
      font-family: 'Fredoka', 'Noto Sans Thai', sans-serif;
      background: var(--cream);
      background:
        radial-gradient(ellipse at 15% 10%, rgba(249,115,22,.18), transparent 45%),
        radial-gradient(ellipse at 85% 10%, rgba(234,179,8,.14), transparent 40%),
        radial-gradient(ellipse at 50% 90%, rgba(249,115,22,.12), transparent 50%),
        var(--cream);
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* ── NAV ── */
    .site-nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--cream);
      border-bottom: 4px solid var(--dark);
      box-shadow: 0 4px 0 var(--dark);
      padding: 10px 16px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .nav-brand { font-family: 'Bungee', cursive; font-size: 15px; color: var(--dark); text-decoration: none; white-space: nowrap; }
    .nav-links { display: flex; gap: 6px; flex-wrap: wrap; }
    .nav-link {
      text-decoration: none; font-size: 13px; font-weight: 600;
      padding: 5px 13px; border-radius: 12px;
      border: 2.5px solid var(--dark); color: var(--dark); background: white;
      transition: all .12s; display: inline-flex; align-items: center; gap: 4px;
      white-space: nowrap; box-shadow: 2px 2px 0 var(--dark);
    }
    .nav-link:hover { background: #fef9c3; transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--dark); }
    .nav-link.active { background: linear-gradient(135deg, var(--c1), var(--c2)); color: white; border-color: transparent; box-shadow: none; }
    @media (max-width: 420px) { .nav-brand { font-size: 13px; } .nav-link { font-size: 11px; padding: 4px 10px; } }

    /* ── BLOBS ── */
    .blobs { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .blob { position: absolute; border-radius: 50%; opacity: .2; animation: drift linear infinite; }
    @keyframes drift {
      0%,100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(20px,-28px) scale(1.06); }
      66% { transform: translate(-16px,18px) scale(.96); }
    }

    /* ── PAGE ── */
    .page { position: relative; z-index: 2; max-width: 480px; margin: 0 auto; padding: 24px 16px 48px; }

    /* ── HERO ── */
    .hero { text-align: center; margin-bottom: 20px; }
    .hero-emoji { font-size: 52px; display: block; margin-bottom: 6px; }
    .hero-title { font-family: 'Bungee', cursive; font-size: 26px; color: var(--dark); letter-spacing: 1px; margin-bottom: 4px; }
    .hero-sub { font-size: 15px; color: #64748b; }

    /* ── SELECTOR BUTTONS ── */
    .selector-wrap { display: flex; gap: 8px; justify-content: center; margin-bottom: 10px; flex-wrap: wrap; }
    .sel-btn {
      font-family: 'Fredoka', 'Noto Sans Thai', sans-serif;
      font-size: 15px; font-weight: 700;
      padding: 10px 20px; border-radius: 999px;
      border: 2.5px solid var(--dark); background: white; cursor: pointer;
      box-shadow: 2px 2px 0 var(--dark); transition: all .12s;

    .sel-btn:hover { background: #fef9c3; transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--dark); }
    .sel-btn.active {
      background: linear-gradient(135deg, var(--c1), var(--c2));
      color: white; border-color: transparent; box-shadow: none;
    }

    /* ── SCORE BAR ── */
    .score-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: white; border: 2.5px solid var(--dark); border-radius: 16px;
      padding: 10px 16px; margin-bottom: 14px;
      box-shadow: 3px 3px 0 var(--dark);
    }
    .score-col { text-align: center; }
    .score-label { font-size: 11px; color: #94a3b8; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; }
    .score-num { font-family: 'Bungee', cursive; font-size: 24px; color: var(--c1); line-height: 1.1; }
    .prog-wrap { flex: 1; margin: 0 14px; }
    .prog-bar { height: 8px; background: #e2e8f0; border-radius: 999px; overflow: hidden; }
    .prog-fill { height: 100%; background: linear-gradient(90deg, var(--c1), var(--c2)); border-radius: 999px; transition: width .4s ease; width: 0%; }

    /* ── LEGEND ── */
    .legend {
      display: flex; justify-content: center; gap: 20px; margin-bottom: 14px;
      font-size: 14px; color: #64748b; font-weight: 600;
    }
    .legend span { display: inline-flex; align-items: center; gap: 5px; }

    /* ── QUESTION CARD ── */
    .q-card {
      background: white; border: 3px solid var(--dark); border-radius: 24px;
      padding: 24px 20px 20px; margin-bottom: 16px;
      box-shadow: 5px 5px 0 var(--dark); text-align: center;

    .blocks-row {

    .num-display {

    }
    .divider {
      height: 4px; background: linear-gradient(90deg, var(--c1), var(--c2));
      border-radius: 99px; margin: 10px auto; max-width: 180px;
    }
    .question-mark {
      font-family: 'Bungee', cursive; font-size: 58px; color: #cbd5e1; margin-top: 4px;
    }

    /* ── CHOICES ── */
    .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .choice-btn {
      font-family: 'Bungee', cursive;
      font-size: 30px; font-weight: 700;
      padding: 20px 8px; border-radius: 18px;
      border: 3px solid var(--dark); background: white;
      cursor: pointer; box-shadow: 4px 4px 0 var(--dark);
      transition: all .12s; color: var(--dark);
    }
    .choice-btn:hover:not(:disabled) { background: #fff7ed; transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--dark); }
    .choice-btn:active:not(:disabled) { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--dark); }
    .choice-btn.correct { background: #dcfce7; border-color: #16a34a; color: #166534; box-shadow: 4px 4px 0 #16a34a; }
    .choice-btn.wrong   { background: #fee2e2; border-color: #dc2626; color: #991b1b; box-shadow: 4px 4px 0 #dc2626; }
    .choice-btn:disabled { cursor: default; }

    /* ── FEEDBACK ── */
    .feedback { text-align: center; font-size: 20px; font-weight: 700; min-height: 32px; margin-bottom: 12px; }
    .feedback.correct { color: #16a34a; }
    .feedback.wrong   { color: #e85c22; }

    /* ── NEXT BUTTON ── */
    .next-btn {
      display: block; width: 100%;
      font-family: 'Fredoka', 'Noto Sans Thai', sans-serif;
      font-size: 20px; font-weight: 700;
      padding: 16px; border-radius: 18px;
      border: 3px solid var(--dark);
      background: linear-gradient(135deg, var(--c1), var(--c2));
      color: white; cursor: pointer;
      box-shadow: 4px 4px 0 var(--dark);
      transition: all .15s;
      opacity: 0; pointer-events: none;
    }
    .next-btn.show { opacity: 1; pointer-events: auto; }
    .next-btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--dark); }

    /* ── RESULT ── */
    .result {
      display: none; text-align: center;
      background: white; border: 3px solid var(--dark); border-radius: 24px;
      padding: 36px 24px; box-shadow: 6px 6px 0 var(--dark);
    }
    .result.show { display: block; }
    .result-emoji { font-size: 72px; margin-bottom: 8px; }
    .result-stars { font-size: 38px; margin-bottom: 10px; }
    .result-title { font-family: 'Bungee', cursive; font-size: 26px; color: var(--dark); margin-bottom: 6px; }
    .result-sub { font-size: 17px; color: #64748b; margin-bottom: 4px; }
    .result-big { font-family: 'Bungee', cursive; font-size: 44px; color: var(--c1); margin-bottom: 28px; }
    .retry-btn {
      font-family: 'Fredoka', 'Noto Sans Thai', sans-serif;
      font-size: 20px; font-weight: 700; padding: 16px 48px;
      border-radius: 999px; border: 3px solid var(--dark);
      background: linear-gradient(135deg, var(--c1), var(--c2));
      color: white; cursor: pointer; box-shadow: 4px 4px 0 var(--dark);
      transition: all .15s;
    }
    .retry-btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--dark); }

    /* ── BACK LINK ── */
    .home-link-wrap { margin-bottom: 16px; }
    .home-link {
      display: inline-flex; align-items: center; gap: 8px;
      background: white; border: 2.5px solid var(--dark); border-radius: 999px;
      padding: 8px 18px; font-size: 14px; font-weight: 700;
      color: var(--dark); text-decoration: none; box-shadow: 2px 2px 0 var(--dark);
      transition: all .12s;
    }
    .home-link:hover { background: #fef9c3; transform: translate(-2px,-2px); box-shadow: 4px 4px 0 var(--dark); }

    @media (max-width: 420px) {
      .num-display { font-size: 42px; }
      .choice-btn { font-size: 24px; padding: 16px 6px; }
      .blocks-row { font-size: 20px; }
      .question-mark { font-size: 46px; }
      .op-row { font-size: 30px; }
    }
  </style>

(function() {

  const wrap = document.getElementById("blobs");
  for (let i = 0; i < 22; i++) {

    b.className = "blob";
    const s = 40 + Math.random() * 120;
    b.style.cssText = `width:${s}px;height:${s}px;background:${cols[i % cols.length]};
      left:${Math.random() * 100}%;top:${Math.random() * 100}%;

<!-- Game logic -->
<script>
const TOTAL = 10;

let mode = 'add';
let level = 1;
let score = 0;
let qIndex = 0;
let answered = false;
let correctAnswer = 0;

// Number ranges per difficulty level
// aMin/aMax = first number, bMin/bMax = second number
const RANGES = [
  { aMin: 20, aMax: 39, bMin: 11, bMax: 18 },   // Easy   ⭐
  { aMin: 30, aMax: 65, bMin: 11, bMax: 30 },   // Medium ⭐⭐
  { aMin: 42, aMax: 86, bMin: 11, bMax: 42 },   // Hard   ⭐⭐⭐
];

function genProblem() {
  const r = RANGES[level - 1];
  let a, b, op;
  let iters = 0;

  // Decide operator
  if (mode === 'add') op = '+';
  else if (mode === 'sub') op = '-';
  else op = Math.random() < 0.5 ? '+' : '-';

  while (true) {
    iters++;
    if (iters > 400) { op = '+'; } // safety fallback to addition

    a = r.aMin + Math.floor(Math.random() * (r.aMax - r.aMin + 1));
    b = r.bMin + Math.floor(Math.random() * (r.bMax - r.bMin + 1));

    const aOnes = a % 10, aTens = Math.floor(a / 10);
    const bOnes = b % 10, bTens = Math.floor(b / 10);

    if (op === '+') {
      // No carrying: ones sum ≤ 9, tens sum ≤ 9
      if (aOnes + bOnes > 9) continue;
      if (aTens + bTens > 9) continue;
      correctAnswer = a + b;
    } else {
      // No borrowing: a > b, aOnes ≥ bOnes, aTens ≥ bTens, result ≥ 10
      if (a <= b) continue;
      if (aOnes < bOnes) continue;
      if (aTens < bTens) continue;
      correctAnswer = a - b;
      if (correctAnswer < 10) continue;
    }
    break;
  }

  return { a, b, op };
}

function renderBlocks(n) {
  const tens = Math.floor(n / 10);
  const ones = n % 10;
  return '🟦'.repeat(tens) + '🔴'.repeat(ones);
}

function genChoices(answer) {
  const s = new Set([answer]);
  const offsets = [10, -10, 1, -1, 11, -11, 9, -9, 2, -2, 20, -20, 3, -3, 5, -5];

  // Shuffle
  for (let i = offsets.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [offsets[i], offsets[j]] = [offsets[j], offsets[i]];
  }

  for (const off of offsets) {
    const w = answer + off;
    if (w >= 10 && w <= 99 && !s.has(w)) s.add(w);
    if (s.size === 4) break;
  }

  // Pad if still < 4
  let extra = 1;
  while (s.size < 4 && extra < 60) {
    const up = answer + extra, down = answer - extra;
    if (up <= 99 && !s.has(up)) s.add(up);
    if (s.size < 4 && down >= 10 && !s.has(down)) s.add(down);
    extra++;
  }

  return [...s].sort(() => Math.random() - 0.5);
}

function loadQuestion() {
  answered = false;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').classList.remove('show');
  document.getElementById('result').classList.remove('show');
  document.getElementById('game-wrap').style.display = '';

  const { a, b, op } = genProblem();

  document.getElementById('blocks-a').textContent = renderBlocks(a);
  document.getElementById('num-a').textContent = a;
  document.getElementById('op-display').textContent = op;
  document.getElementById('blocks-b').textContent = renderBlocks(b);
  document.getElementById('num-b').textContent = b;
  document.getElementById('q-display').textContent = `${qIndex + 1}/10`;
  document.getElementById('prog-fill').style.width = `${(qIndex / TOTAL) * 100}%`;

  const choices = genChoices(correctAnswer);
  const container = document.getElementById('choices');
  container.innerHTML = '';
  choices.forEach(val => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = val;
    btn.onclick = () => handleChoice(btn, val);
    container.appendChild(btn);
  });
}

function handleChoice(btn, val) {
  if (answered) return;
  answered = true;

  const allBtns = document.querySelectorAll('.choice-btn');
  allBtns.forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');
  if (val === correctAnswer) {
    btn.classList.add('correct');
    fb.textContent = '🎉 เก่งมาก! ถูกต้องเลย!';
    fb.className = 'feedback correct';
    score++;
    document.getElementById('score-display').textContent = score;
  } else {
    btn.classList.add('wrong');
    allBtns.forEach(b => { if (+b.textContent === correctAnswer) b.classList.add('correct'); });
    fb.textContent = '💪 ลองใหม่นะ! คำตอบคือ ' + correctAnswer;
    fb.className = 'feedback wrong';
  }

  if (qIndex < TOTAL - 1) {
    document.getElementById('next-btn').classList.add('show');
  } else {
    setTimeout(showResult, 1200);
  }
}

function showResult() {
  document.getElementById('game-wrap').style.display = 'none';
  const result = document.getElementById('result');
  result.classList.add('show');
  document.getElementById('prog-fill').style.width = '100%';

  const pct = score / TOTAL;
  let emoji, stars;
  if (pct === 1)       { emoji = '🏆'; stars = '⭐⭐⭐'; }
  else if (pct >= 0.7) { emoji = '🎉'; stars = '⭐⭐'; }
  else if (pct >= 0.5) { emoji = '😊'; stars = '⭐'; }
  else                 { emoji = '💪'; stars = ''; }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-stars').textContent = stars;
  document.getElementById('result-score').textContent = `${score}/10`;
}

function resetGame() {
  score = 0;
  qIndex = 0;
  document.getElementById('score-display').textContent = '0';
  document.getElementById('prog-fill').style.width = '0%';
  document.getElementById('result').classList.remove('show');
  document.getElementById('game-wrap').style.display = '';
  loadQuestion();
}

document.getElementById('next-btn').onclick = () => {
  qIndex++;
  loadQuestion();
};

document.getElementById('retry-btn').onclick = resetGame;

// Mode buttons
document.querySelectorAll('#mode-wrap .sel-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('#mode-wrap .sel-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    resetGame();
  };
});

// Level buttons
document.querySelectorAll('#level-wrap .sel-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('#level-wrap .sel-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    level = +btn.dataset.level;
    resetGame();
  };
});

// Init
loadQuestion();
</script>
